name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy to Staging
    runs-on: [self-hosted, Linux, X64, staging]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Dependencies
      run: npm install

    - name: Install web-vitals
      run: npm install web-vitals

    - name: Build the Application
      run: CI='' npm run build

    - name: Deploy to Staging Server
      run: |
        echo "📁 Preparing backup directory..."
        sudo mkdir -p /opt/tomcat/webapps/backup

        echo "🗃️ Backing up old ROOT..."
        if [ -d /opt/tomcat/webapps/ROOT ]; then
          sudo mv /opt/tomcat/webapps/ROOT /opt/tomcat/webapps/backup/ROOT_$(date +%F-%T)
          echo "✅ Old ROOT backed up."
        fi

        echo "📂 Creating new ROOT directory..."
        sudo mkdir -p /opt/tomcat/webapps/ROOT

        echo "🚚 Copying new build contents to ROOT..."
        sudo cp -r build/* /opt/tomcat/webapps/ROOT/

        echo "🔧 Setting permissions..."
        sudo chown -R ubuntu:ubuntu /opt/tomcat/webapps/ROOT
        sudo chmod -R 755 /opt/tomcat/webapps/ROOT

        echo "🔄 Restarting Tomcat..."
        sudo systemctl restart tomcat

        echo "🚀 Deployment to ROOT complete!"
