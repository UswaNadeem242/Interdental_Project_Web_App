name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy to Staging
    runs-on: [self-hosted, Linux, X64]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Dependencies
      run: npm install

    - name: Install web-vitals
      run: npm install web-vitals

    - name: Build the Application
      run: CI='' npm run build

    - name: Deploy to /var/www/interdentalusa.com
      run: |
        TARGET_DIR=/var/www/interdentalusa.com
        BACKUP_DIR=/var/www/backup/interdentalusa.com_$(date +%F-%T)

        echo "📁 Creating backup directory: $BACKUP_DIR"
        sudo mkdir -p $BACKUP_DIR

        echo "🗃️ Backing up current deployment..."
        if [ -d "$TARGET_DIR" ]; then
          sudo cp -r $TARGET_DIR/* $BACKUP_DIR/
          echo "✅ Backup completed: $BACKUP_DIR"
        else
          echo "⚠️ Target directory does not exist. Skipping backup."
        fi

        echo "🧹 Cleaning target directory..."
        sudo rm -rf $TARGET_DIR/*
        
        echo "🚚 Copying new build to $TARGET_DIR"
        sudo cp -r build/* $TARGET_DIR/

        echo "🔧 Setting permissions..."
        sudo chown -R ubuntu:www-data $TARGET_DIR
        sudo chmod -R 755 $TARGET_DIR

        echo "🚀 Deployment to $TARGET_DIR complete!"
