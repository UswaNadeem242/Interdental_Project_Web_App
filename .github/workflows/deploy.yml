name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy to Staging
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install npm dependencies
      run: npm install

    - name: Install web-vitals
      run: npm install web-vitals

    - name: Build the Application
      run: CI=false npm run build

    - name: Check if Build Folder Exists
      run: |
        if [ ! -d "build" ]; then
          echo "❌ Build folder not found! Exiting..."
          exit 1
        fi
        echo "✅ Build folder exists. Proceeding with deployment."

    - name: Install SSH & SCP
      run: sudo apt-get update && sudo apt-get install -y sshpass

    - name: Deploy to Staging Server
      env:
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      run: |
        SERVER_USER="ubuntu"
        SERVER_IP="43.204.227.243"
        TARGET_DIR="/opt/tomcat/webapps"
        BUILD_DIR_NAME="build"
        BACKUP_DIR_NAME="backup"

        # Step 1: Backup existing build if it exists
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP << EOF
          sudo mkdir -p $TARGET_DIR/$BACKUP_DIR_NAME
          if [ -d $TARGET_DIR/ROOT ]; then
            TIMESTAMP=\$(date +%F-%T)
            sudo mv $TARGET_DIR/ROOT $TARGET_DIR/$BACKUP_DIR_NAME/ROOT_\$TIMESTAMP
            echo "✅ Existing ROOT moved to backup/ROOT_\$TIMESTAMP"
          else
            echo "ℹ️ No existing ROOT directory found, skipping backup."
          fi
          sudo mkdir -p $TARGET_DIR/ROOT
        EOF

        # Step 2: Upload new build folder
        sshpass -p "$SSH_PASSWORD" scp -r $BUILD_DIR_NAME $SERVER_USER@$SERVER_IP:/tmp/latest_build

        # Step 3: Deploy to Tomcat ROOT
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP << EOF
          sudo rm -rf $TARGET_DIR/ROOT/*
          sudo cp -r /tmp/latest_build/* $TARGET_DIR/ROOT/
          sudo rm -rf /tmp/latest_build

          echo "✅ New build copied to ROOT directory."

          # ✅ Set permissions for Tomcat group and Ubuntu user
          sudo chown -R $SERVER_USER:tomcat $TARGET_DIR
          sudo chmod -R 775 $TARGET_DIR

          sudo systemctl restart tomcat

          echo "🚀 Deployment completed successfully."
        EOF
