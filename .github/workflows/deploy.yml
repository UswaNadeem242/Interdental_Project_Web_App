name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy to Staging
    runs-on: [self-hosted, Linux, X64, staging]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Dependencies
      run: npm install

    - name: Install web-vitals
      run: npm install web-vitals

    - name: Build the Application
      run: CI='' npm run build

    - name: Deploy to Staging Server
      run: |
        echo "📁 Preparing backup directory..."
        sudo mkdir -p /opt/tomcat/webapps/backup

        echo "🗃️ Backing up old build..."
        if [ -d /opt/tomcat/webapps/build ]; then
          sudo mv /opt/tomcat/webapps/build /opt/tomcat/webapps/backup/build_$(date +%F-%T)
          echo "✅ Old build backed up."
        fi

        echo "🚚 Copying new build..."
        sudo cp -r build /opt/tomcat/webapps/

        echo "🔧 Setting permissions..."
        sudo chown -R ubuntu:ubuntu /opt/tomcat/webapps/build
        sudo chmod -R 755 /opt/tomcat/webapps/build

        echo "🔄 Restarting Tomcat..."
        sudo systemctl restart tomcat

        echo "🚀 Deployment complete!"
