name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy to VPS
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v3

      - name: 🧰 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🛠 Build the React app
        run: CI=false npm run build

      - name: 🚀 Deploy to VPS folder
        run: |
          TARGET_DIR="/var/www/interdentalusa.com"
          BACKUP_DIR="/var/www/backup/interdentalusa.com_$(date +'%F-%H-%M-%S')"

          echo "📁 Creating backup directory at: $BACKUP_DIR"
          sudo mkdir -p "$BACKUP_DIR"

          echo "📤 Backing up current deployment from $TARGET_DIR"
          if [ -d "$TARGET_DIR" ] && [ "$(ls -A $TARGET_DIR 2>/dev/null)" ]; then
            sudo cp -r "$TARGET_DIR"/* "$BACKUP_DIR"/
            echo "✅ Backup completed"
          else
            echo "⚠️ No existing deployment found. Skipping backup."
          fi

          echo "🧹 Cleaning target directory"
          sudo mkdir -p "$TARGET_DIR"
          sudo rm -rf "$TARGET_DIR"/*

          echo "📁 Copying build files to $TARGET_DIR"
          sudo cp -r build/* "$TARGET_DIR"/

          echo "🔒 Fixing ownership and permissions"
          sudo chown -R ubuntu:www-data "$TARGET_DIR"
          sudo chmod -R 755 "$TARGET_DIR"

          echo "✅ Deployment complete!"
